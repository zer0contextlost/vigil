# vigil.toml — generated by `vigil init`
# Uncomment and adjust sections as needed.
# Run with: vigil run --config vigil.toml -- <agent>

[proxy]
# port = 8877
# write_approval_threshold = "Medium"       # "Low" | "Medium" | "High"
# tool_timeout_secs = 600                   # alert after N seconds of tool silence
# tool_timeout_kill_secs = 900              # kill agent after N seconds (>= tool_timeout_secs)

[web]
# port = 8878                               # browser dashboard; omit to disable

[budget]
# max_cost_usd = 5.0                        # hard stop at this spend
# max_tokens = 500000                       # hard stop at this token count
# cost_alert_usd = 2.0                      # soft alert (no stop) at this spend
# max_burn_rate_usd_per_min = 0.10          # BURN alert when rolling $/min exceeds this
# max_session_duration_mins = 60            # DURA alert after this many minutes
# max_sub_agent_depth = 3                   # deny Task tool calls beyond this depth
# allowed_hours = "09:00-18:00"            # only allow runs during this window (local time)

[session]
# store_raw = false                         # store raw request/response bodies

[pii]
# watchlist_file = ".vigil-watchlist"       # one custom term per line

[notify]
# webhook = "https://hooks.example.com/..."
# webhook_events = ["BURN", "EXFL", "DENY"] # omit to forward all alerts

[drift]
# baseline_turns = 5
# window_turns = 5
# acceleration_multiplier = 3.0
# stall_threshold = 5

[approval]
# yolo_paths    = ["tests/", "*.md", "docs/"]   # never need approval
# watch_paths   = ["src/"]                       # always need approval
# lockdown_paths = [".env", "*.pem", "*.key"]   # approval + elevated warning

