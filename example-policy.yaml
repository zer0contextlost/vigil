# vigil example policy file
# Pass with: vigil run --policy example-policy.yaml -- <agent>
#
# Actions: Deny, Confirm, LogOnly
# Matchers: ToolCall, FsWriteOutside, FsPath, NetworkDomain, TokenBudget, AnyLlmRequest, ToolCallInput
# First-match wins. See POLICY_ENGINE.md for the hardcoded safety floor.

policies:
  # Block any Bash tool call
  - name: block-bash
    matcher:
      type: ToolCall
      tool_name_pattern: "Bash"
    action: Deny

  # Block file writes outside the project root
  - name: deny-writes-outside-project
    matcher:
      type: FsWriteOutside
      root: "."
    action: Deny

  # Log reads of .env files without blocking
  - name: log-env-reads
    matcher:
      type: FsPath
      path_pattern: ".env"
    action: LogOnly

  # Block reads of files containing "secrets" in path
  - name: deny-secrets-reads
    matcher:
      type: FsPath
      path_pattern: "secrets"
    action: Deny

  # Only allow LLM calls to OpenAI or Anthropic endpoints
  - name: restrict-to-known-providers
    matcher:
      type: NetworkDomain
      deny_unless_in: ["openai", "anthropic"]
    action: Deny

  # Log a warning when session hits 1M tokens
  - name: token-budget-warning
    matcher:
      type: TokenBudget
      max_tokens: 1000000
    action: LogOnly

  # Log all LLM requests
  - name: log-all-requests
    matcher:
      type: AnyLlmRequest
    action: LogOnly

  # Block http_request tool calls targeting localhost
  - name: deny-localhost-requests
    matcher:
      type: ToolCallInput
      tool_name_pattern: "http_request"
      input_field: "url"
      value_pattern: "localhost"
    action: Deny
